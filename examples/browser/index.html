<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>yolo-onnx-web browser example</title>
    <style>
      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: #172033;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      main {
        display: flex;
        height: 100vh;
        flex-direction: column;
        box-sizing: border-box;
        padding: 18px;
        background: #fff;
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      p {
        margin: 6px 0 0;
        color: #667085;
      }

      .panel {
        margin-top: 14px;
        padding: 14px;
        background: #f8fafc;
        border: 1px solid #edf0f5;
        border-radius: 12px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        margin: 0;
        color: #344054;
        font-size: 13px;
        font-weight: 600;
      }

      input,
      select,
      button {
        font: inherit;
      }

      input,
      select {
        min-width: 0;
        padding: 9px 10px;
        color: #172033;
        background: #fff;
        border: 1px solid #d8dee9;
        border-radius: 10px;
      }

      button {
        padding: 9px 14px;
        color: #fff;
        cursor: pointer;
        background: #2563eb;
        border: 0;
        border-radius: 10px;
      }

      button:disabled {
        cursor: not-allowed;
        background: #9ca3af;
      }

      canvas {
        display: block;
        width: 100%;
      }

      pre {
      
        height: 220px;
        margin: 0;
        padding: 12px;
        overflow: auto;
        color: #e5e7eb;
        background: #111827;
        border-radius: 12px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 10px;
        margin-top: 12px;
      }

      .workspace {
        display: flex;
        flex: 1;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 14px;
        margin-top: 14px;
      }

      .preview-panel {
        display: flex;
        flex: 1 1 40%;
        flex-direction: column;
        min-width: 0;
        height: 100%;
      }

      .viewer {
        position: relative;
        align-self: flex-start;
        width: 100%;
        overflow: hidden;
        background: #0f172a;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        flex: 1;
      }

      .viewer video,
      .viewer canvas {
        display: block;
        width: 100%;
        height: auto;
        max-width: 100%;
      }

      .viewer video {
        display: none;
      }

      .viewer.camera-mode video {
        display: block;
      }

      .viewer.camera-mode canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .fps-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 2;
        display: none;
        padding: 6px 10px;
        color: #f8fafc;
        font-size: 13px;
        font-weight: 700;
        background: rgb(15 23 42 / 78%);
        border: 1px solid rgb(255 255 255 / 16%);
        border-radius: 999px;
        pointer-events: none;
      }

      .viewer.camera-mode .fps-badge {
        display: block;
      }

      .side {
        display: grid;
        flex: 1 1 280px;
        gap: 12px;
        align-content: start;
        min-width: 280px;
      }

      @media (max-width: 900px) {
        main {
          min-height: 100dvh;
          padding: 12px;
        }

        h1 {
          font-size: 20px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .workspace {
          flex-direction: column;
          flex-wrap: nowrap;
          align-items: stretch;
          gap: 12px;
        }

        .preview-panel {
          flex: none;
          width: 100%;
          height: auto;
        }

        .controls {
          flex-direction: column;
          align-items: stretch;
        }

        .controls button {
          width: 100%;
        }

        .viewer {
          align-self: stretch;
          width: 100%;
          max-width: 100%;
          flex: none;
        }

        .side {
          flex: none;
          width: 100%;
          min-width: 0;
        }

        pre {
          width: 100%;
          height: 160px;
          box-sizing: border-box;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>yolo-onnx-web 浏览器推理示例</h1>
      <p>加载 ONNX 模型后，可上传图片或打开摄像头进行单帧检测。</p>

      <section class="panel">
        <div class="grid">
          <label>
            推理后端<a href="https://onnxruntime.ai/docs/get-started/with-javascript/web.html#supported-versions" target="_blank">支持版本</a>
            <select id="backend"></select>
          </label>

          <label>
            输入方式
            <select id="inputMode">
              <option value="image">上传图片</option>
              <option value="camera" selected>摄像头</option>
            </select>
          </label>

          <label>
            模型 URL
            <input id="modelUrl" placeholder="/examples/model/yolo26s.onnx" />
          </label>

          <label>
            本地 ONNX
            <input id="modelFile" type="file" accept=".onnx" />
          </label>
        </div>
      </section>

      <section class="workspace">
        <div class="preview-panel">
          <label id="imageInputGroup">
            上传图片
            <input id="imageFile" type="file" accept="image/*" />
          </label>

          <div class="controls">
            <button id="startCameraButton" type="button" style="display: none">打开摄像头</button>
            <button id="stopCameraButton" type="button" style="display: none" disabled>关闭摄像头</button>
            <button id="runButton" disabled>运行推理</button>
          </div>

          <div id="viewer" class="viewer">
            <video id="cameraVideo" autoplay playsinline muted></video>
            <canvas id="preview"></canvas>
            <div id="fpsBadge" class="fps-badge">FPS: --</div>
          </div>
        </div>

        <div class="side">
          <pre id="modelInfo">等待加载模型...</pre>
          <pre id="output">模型加载完成后选择输入并点击运行推理。</pre>
        </div>
      </section>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
